{% load static %}
<!DOCTYPE html>
<html>
<head>
<title>ShopX Signup</title>
<link rel="stylesheet" href="{% static 'css/auth.css' %}">
</head>

<body>

<div class="auth-container">

<!-- LEFT SIDE -->
<div class="auth-left">

<div class="overlay-text">
<h1>Create Account</h1>
<p>
Next-generation marketplace
for seamless shopping & selling.
</p>
</div>

</div>


<!-- SIGNUP CARD -->
<div class="auth-right">

<div class="auth-card">

<h2>Join <span>ShopX</span></h2>

<form method="post">
{% csrf_token %}

<input name="username" placeholder="Username" required>

<input type="email"
name="email"
placeholder="Email"
required>

<input type="password"
name="password"
placeholder="Password"
required>



<button type="submit">SIGN UP</button>

<p>
Already registered?
<a href="{% url 'login' %}">
Login
</a>
</p>

</form>

</div>

</div>

</div>

</body>
</html>
