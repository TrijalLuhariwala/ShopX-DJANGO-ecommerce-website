{% for i in cart.cartitem_set.all %}

<div class="cart-item">

<img src="{{i.product.images.first.image.url}}">

<div>
<h3>{{i.product.name}}</h3>

<form method="post"
action="{% url 'update_cart_quantity' i.id %}">
{% csrf_token %}

<input type="number"
name="quantity"
value="{{i.quantity}}"
min="0">

<button>Update</button>
</form>

</div>

</div>

{% endfor %}
