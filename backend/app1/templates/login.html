{% load static %}
<!DOCTYPE html>
<html>
<head>
<title>ShopX Login</title>
<link rel="stylesheet" href="{% static 'css/auth.css' %}">
</head>

<body>

<div class="auth-container">

<!-- LEFT IMAGE SECTION -->
<div class="auth-left">

<div class="overlay-text">
<h1>Join ShopX</h1>
<p>
Start shopping or selling instantly
with your ShopX account.
</p>
</div>

</div>


<!-- RIGHT LOGIN CARD -->
<div class="auth-right">

<div class="auth-card">

<h2>Login <span>ShopX</span></h2>

<form method="post">
{% csrf_token %}

<input name="username" placeholder="Username" required>

<input type="password"
name="password"
placeholder="Password"
required>

<button type="submit">LOGIN</button>

<p>
Don't have account?
<a href="{% url 'signup' %}">
Create Account
</a>
</p>

</form>

</div>

</div>

</div>

</body>
</html>
